on:
  release:
    types: [published]

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure Git for private repos
      run: |
        git config --global user.name "bstruct"
        git config --global user.email "git@bstruct.com"
        git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

    - name: Set pre-release flag
      id: release_type
      run: |
        if [ "${{ github.event.release.prerelease }}" = "true" ]; then
          echo "flag=--pre-release" >> $GITHUB_OUTPUT
        else
          echo "flag=" >> $GITHUB_OUTPUT
        fi
    
    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
    - run: npm install
    - name: Install wasm-pack
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    
    - run: mkdir dist
    - name: Package extension
      env:
        CARGO_NET_GIT_FETCH_WITH_CLI: true
      run: npx vsce package ${{ steps.release_type.outputs.flag }}
      
    - name: Publish to Visual Studio Marketplace
      run: npx vsce publish ${{ steps.release_type.outputs.flag }} --packagePath *.vsix
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
    - name: Publish to Open VSX Registry
      run: npx ovsx publish *.vsix ${{ steps.release_type.outputs.flag }}
      env:
        OVSX_PAT: ${{ secrets.OVSX_PAT }}